<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Delay SJNAM</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
    :root {
        --primary: #1e40af;
        --primary-dark: #1e3a8a;
        --secondary: #f3f4f6;
        --success: #4CAF50;
        --warning: #FF9800;
        --danger: #F44336;
        --yellow: #FFC107;
        --grey: #9E9E9E;
        --text: #1f2937;
        --border: #e5e7eb;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --radius: 8px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        color: var(--text);
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
    }

    .header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        padding: 24px 32px;
        text-align: center;
    }

    .header h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .header p {
        font-size: 14px;
        opacity: 0.9;
        margin-top: 4px;
    }

    .nav-tabs {
        display: flex;
        background: var(--secondary);
        border-bottom: 2px solid var(--border);
        overflow-x: auto;
    }

    .nav-tab {
        padding: 16px 24px;
        cursor: pointer;
        border: none;
        background: transparent;
        font-size: 15px;
        font-weight: 600;
        color: #6b7280;
        transition: all 0.3s ease;
        white-space: nowrap;
        border-bottom: 3px solid transparent;
    }

    .nav-tab:hover {
        background: rgba(30, 64, 175, 0.05);
        color: var(--primary);
    }

    .nav-tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
        background: white;
    }

    .tab-content {
        display: none;
        padding: 32px;
        animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
        display: block;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 20px;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 10px;
    }
